services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
    env_file:
      - path: .env
        required: false
    volumes:
      - ./database:/app/database
      - ./chat_history:/app/chat_history
    restart: unless-stopped
